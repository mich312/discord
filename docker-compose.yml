# quorum + postgres. `docker compose up` and open http://localhost.
#
# For anything beyond localhost, set RP_ID/RP_ORIGIN to the public origin
# you serve from (passkeys are bound to it) and terminate TLS in front —
# WebAuthn and getUserMedia require a secure context off localhost.
services:
  quorum:
    build: .
    ports:
      - "80:80"
    environment:
      DATABASE_URL: postgres://quorum:quorum@db/quorum
      RP_ID: ${RP_ID:-localhost}
      RP_ORIGIN: ${RP_ORIGIN:-http://localhost}
      # Generate once and keep, or push subscriptions die on restart (the raw
      # 32-byte scalar is at DER offset 7 — count from the front, not
      # `tail -c 32`, which trails the curve OID and yields a malformed key):
      #   openssl ecparam -genkey -name prime256v1 | openssl ec -no_public \
      #     -outform DER 2>/dev/null | tail -c +8 | head -c 32 | basenc --base64url | tr -d '='
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      # Voice ICE servers (JSON array of RTCIceServer). The default public STUN
      # only traverses cone NATs — supply your own TURN for calls to work
      # across restrictive networks (TURN relays ciphertext only). Example:
      #   ICE_SERVERS='[{"urls":"turn:turn.example.org:3478","username":"u","credential":"p"}]'
      ICE_SERVERS: ${ICE_SERVERS:-}
      # Preferred over ICE_SERVERS: run coturn (deploy/docker-compose.turn.yml)
      # and the relay mints short-lived per-user TURN credentials from these.
      TURN_URLS: ${TURN_URLS:-}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_TTL: ${TURN_TTL:-3600}
    volumes:
      - blobs:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: quorum
      POSTGRES_PASSWORD: quorum
      POSTGRES_DB: quorum
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quorum"]
      interval: 3s
      timeout: 3s
      retries: 15
    restart: unless-stopped

volumes:
  blobs:
  pgdata:
